# /etc/xdg/reflector/reflector.conf — AtivOS
#
# Used by reflector.service/reflector.timer (both shipped by the
# `reflector` package) to re-rank the mirrorlist for actual speed instead
# of leaving whatever mirrors the ISO happened to ship with. Runs once at
# install time and then again automatically on the timer.
--save /etc/pacman.d/mirrorlist
--protocol https
--latest 20
--age 12
--sort rate
--download-timeout 7
