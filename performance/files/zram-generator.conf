# /etc/systemd/zram-generator.conf — AtivOS
#
# Creates a compressed RAM-backed swap device (zram0) at boot. This is the
# same approach CachyOS/most performance-oriented Arch spins use: swap that
# lives in (compressed) RAM is an order of magnitude faster than swap on
# disk, so the system can use "swap" as a safety valve for memory pressure
# without the usual disk-swap slowdown.
#
# zram-size is capped at 8G so it doesn't eat all your RAM on high-memory
# systems — half your RAM (up to that cap) compressed with zstd is plenty.
[zram0]
zram-size = min(ram / 2, 8192)
compression-algorithm = zstd
swap-priority = 100
fs-type = swap
