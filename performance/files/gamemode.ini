; /etc/gamemode.ini — AtivOS defaults
; Applied automatically to any process launched via `gamemoderun` (or
; whose game engine calls into GameMode directly, e.g. via Proton/Feral
; integration). See `man gamemoded` for every option.

[general]
; Re-nice the game process for a small scheduling priority boost.
renice = 10
; Let games request soft-realtime scheduling when they ask for it.
softrealtime = auto
; Skip the "may I?" desktop notification popup — just apply it.
inhibit_screensaver = 1

[gpu]
; Bump the GPU to its performance power state while a game is running,
; then let it drop back down automatically when the game exits.
apply_gpu_optimisations = accept-responsibility
gpu_device = 0

[custom]
start = notify-send -a GameMode "GameMode activated"
end = notify-send -a GameMode "GameMode deactivated"
