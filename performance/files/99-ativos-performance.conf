# /etc/sysctl.d/99-ativos-performance.conf — AtivOS
#
# Desktop/gaming-oriented kernel tuning, in the spirit of CachyOS's
# performance defaults. Safe on both desktops and laptops.
#
# NOTE: vm.swappiness is intentionally NOT set here. With zram active,
# 61-ativos-zram-swap.rules (a udev rule) raises it to 150 automatically
# the moment zram0 appears, and drops it back to a disk-swap-friendly
# value if zram isn't present. Setting a static value here would fight
# that rule.

# ---- memory management ----------------------------------------------
# Reclaim less of the directory/inode cache before reclaiming other memory
# — keeps the filesystem cache warm, which pays off on every I/O-heavy task.
vm.vfs_cache_pressure = 50

# Start background writeback earlier and cap total dirty memory, so a big
# write burst doesn't build up gigabytes of unwritten data and then stall
# everything else when it finally flushes.
vm.dirty_bytes = 268435456
vm.dirty_background_bytes = 134217728

# Flush dirty pages more often (in centiseconds) for smoother, more
# predictable I/O instead of large periodic stalls.
vm.dirty_writeback_centisecs = 1500

# Read a single page at a time from swap instead of a whole cluster —
# correct for fast zram/NVMe swap where clustering just wastes work.
vm.page-cluster = 0

# ---- scheduler / latency ----------------------------------------------
# Let unprivileged processes create user namespaces (needed by sandboxed
# apps/containers like Flatpak, bubblewrap, some browsers).
kernel.unprivileged_userns_clone = 1

# Quiet the NMI watchdog — it periodically steals a tiny slice of CPU time
# on every core purely for hang detection most desktop users don't need.
kernel.nmi_watchdog = 0

# ---- filesystem ----------------------------------------------------------
# Raise the inotify watch limit — IDEs, file syncers, and dev tooling (esp.
# anything watching node_modules-sized trees) exhaust the stock 8k default.
fs.inotify.max_user_watches = 524288

# ---- networking (desktop-friendly defaults) ----------------------------
net.core.netdev_max_backlog = 4096
net.ipv4.tcp_fastopen = 3
