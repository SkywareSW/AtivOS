# /etc/mangohud/MangoHud.conf — AtivOS defaults
#
# MangoHud is opt-in per-game (launch options: `mangohud %command%` in
# Steam, or `mangohud <game>` from a terminal) — this file just makes the
# overlay look decent the first time someone turns it on.
fps
frame_timing
cpu_temp
gpu_temp
ram
vram
position=top-left
background_alpha=0.4
font_size=20
toggle_hud=Shift_R+F12
